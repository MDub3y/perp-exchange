version: '3.8'

services:
  app-db:
    image: postgres:16-alpine
    container_name: perp_app_db
    environment: 
      POSTGRES_USER: exchange_admin
      POSTGRES_PASSWORD: exchange_secure_password
      POSTGRES_DB: exchange_v1
    ports:
      - "5432:5432"
    volumes:
      - pg_app_data:/var/lib/postgresql/data

  exchange-redis: 
    image: redis:7.2-alpine
    container_name: perp_app_redis
    command: redis-server --appendonly yes --save ""
    ports: 
      - "6379:6379"
      
volumes:
  pg_app_data: