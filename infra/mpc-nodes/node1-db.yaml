apiVersion: v1
kind: Namespace
metadata: 
  name: mpc-crypto
---
apiVersion: v1
kind: Secret
metadata: 
  name: mpc-db-secret
  namespace: mpc-crypto
type: Opaque
stringData: 
  POSTGRES_USER: mpc_operator_1
  POSTGRES_PASSWORD: supersecretpasswordnode1
  POSTGRES_DB: mpc_shares_1
---
apiVersion: v1
kind: Service
metadata: 
  name: postgres-mpc
  namespace: mpc-crypto
spec:
  ports:
  - port: 5432
    targetPort: 5432
  selector: 
    app: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata: 
  name: postgres
  namespace: mpc-crypto
spec: 
  serviceName: "postgres-mpc"
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        envFrom:
        - secretRef:
            name: mpc-db-secret
        ports:
        - containerPort: 5432
          name: postgres
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
        volumeMounts:
        - name: pgdata
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: pgdata
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi